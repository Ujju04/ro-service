openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RO Service Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: bookings
    description: Booking management
  - name: products
    description: Products and AMC plans
  - name: technicians
    description: Technician management
  - name: pricing
    description: Pricing and estimates
  - name: chat
    description: AI chatbot
  - name: reviews
    description: Reviews and ratings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/technician/register:
    post:
      operationId: registerTechnician
      tags: [auth]
      summary: Register a technician
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianRegisterRequest"
      responses:
        "201":
          description: Technician registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/technician/login:
    post:
      operationId: loginTechnician
      tags: [auth]
      summary: Login technician
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # BOOKINGS
  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    get:
      operationId: getUserBookings
      tags: [bookings]
      summary: Get user bookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBookingById
      tags: [bookings]
      summary: Get booking by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (technician)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/accept:
    post:
      operationId: acceptBooking
      tags: [bookings]
      summary: Accept a booking (technician)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/reject:
    post:
      operationId: rejectBooking
      tags: [bookings]
      summary: Reject a booking (technician)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/bill:
    post:
      operationId: generateBill
      tags: [bookings]
      summary: Generate bill for booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBillRequest"
      responses:
        "200":
          description: Bill generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  # TECHNICIANS
  /technicians/nearby:
    get:
      operationId: getNearbyTechnicians
      tags: [technicians]
      summary: Get nearby available technicians
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: List of nearby technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"

  /technicians/me:
    get:
      operationId: getTechnicianProfile
      tags: [technicians]
      summary: Get technician profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Technician profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
    patch:
      operationId: updateTechnicianProfile
      tags: [technicians]
      summary: Update technician profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTechnicianRequest"
      responses:
        "200":
          description: Updated technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/me/availability:
    patch:
      operationId: updateAvailability
      tags: [technicians]
      summary: Toggle technician availability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityRequest"
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/me/bookings:
    get:
      operationId: getTechnicianBookings
      tags: [technicians]
      summary: Get technician's assigned bookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /technicians/me/earnings:
    get:
      operationId: getTechnicianEarnings
      tags: [technicians]
      summary: Get technician earnings summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"

  # PRODUCTS
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProductById
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /amc-plans:
    get:
      operationId: getAmcPlans
      tags: [products]
      summary: Get all AMC plans
      responses:
        "200":
          description: List of AMC plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AmcPlan"

  /amc-plans/subscribe:
    post:
      operationId: subscribeAmcPlan
      tags: [products]
      summary: Subscribe to an AMC plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeAmcRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmcSubscription"

  # PRICING
  /pricing/parts:
    get:
      operationId: getPricingParts
      tags: [pricing]
      summary: Get all parts with pricing
      responses:
        "200":
          description: List of parts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Part"

  /pricing/estimate:
    post:
      operationId: estimateCost
      tags: [pricing]
      summary: Estimate repair cost based on issues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateRequest"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"

  # CHAT
  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send message to AI chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history for session
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  # REVIEWS
  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/technician/{technicianId}:
    get:
      operationId: getTechnicianReviews
      tags: [reviews]
      summary: Get reviews for a technician
      parameters:
        - name: technicianId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # USER PROFILE
  /users/me:
    get:
      operationId: getUserProfile
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUserProfile
      tags: [auth]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # WATER QUALITY
  /water-quality/{city}:
    get:
      operationId: getWaterQuality
      tags: [pricing]
      summary: Get water quality info for a city
      parameters:
        - name: city
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Water quality data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterQuality"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        address:
          type: string
        city:
          type: string
      required: [name, email, phone, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    TechnicianRegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        experience:
          type: integer
        city:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
      required: [name, email, phone, password, city]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
          enum: [user, technician]
        user:
          $ref: "#/components/schemas/User"
        technician:
          $ref: "#/components/schemas/Technician"
      required: [token, role]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, phone]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string

    Technician:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        experience:
          type: integer
        city:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        isAvailable:
          type: boolean
        rating:
          type: number
        totalJobs:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, phone, isAvailable]

    UpdateTechnicianRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        lat:
          type: number
        lng:
          type: number

    UpdateAvailabilityRequest:
      type: object
      properties:
        isAvailable:
          type: boolean
      required: [isAvailable]

    Booking:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        technicianId:
          type: integer
        serviceType:
          type: string
          enum: [repair, installation, amc, inspection]
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, cancelled, rejected]
        bookingType:
          type: string
          enum: [instant, scheduled]
        scheduledAt:
          type: string
          format: date-time
        address:
          type: string
        city:
          type: string
        description:
          type: string
        symptoms:
          type: string
        estimatedCost:
          type: number
        finalAmount:
          type: number
        serviceCharge:
          type: number
        partsUsed:
          type: array
          items:
            $ref: "#/components/schemas/BookingPart"
        userName:
          type: string
        userPhone:
          type: string
        technicianName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, serviceType, status, bookingType, address]

    BookingPart:
      type: object
      properties:
        partId:
          type: integer
        partName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
      required: [partId, partName, quantity, unitPrice, totalPrice]

    CreateBookingRequest:
      type: object
      properties:
        serviceType:
          type: string
          enum: [repair, installation, amc, inspection]
        bookingType:
          type: string
          enum: [instant, scheduled]
        scheduledAt:
          type: string
          format: date-time
        address:
          type: string
        city:
          type: string
        description:
          type: string
        symptoms:
          type: string
        lat:
          type: number
        lng:
          type: number
      required: [serviceType, bookingType, address, city]

    UpdateBookingStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [in_progress, completed, cancelled]
      required: [status]

    GenerateBillRequest:
      type: object
      properties:
        parts:
          type: array
          items:
            $ref: "#/components/schemas/BillPartRequest"
        serviceCharge:
          type: number
        notes:
          type: string
      required: [serviceCharge]

    BillPartRequest:
      type: object
      properties:
        partId:
          type: integer
        quantity:
          type: integer
      required: [partId, quantity]

    Bill:
      type: object
      properties:
        bookingId:
          type: integer
        parts:
          type: array
          items:
            $ref: "#/components/schemas/BookingPart"
        serviceCharge:
          type: number
        partsTotal:
          type: number
        totalAmount:
          type: number
        notes:
          type: string
      required: [bookingId, serviceCharge, partsTotal, totalAmount]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        brand:
          type: string
        rating:
          type: number
        imageUrl:
          type: string
        features:
          type: array
          items:
            type: string
        inStock:
          type: boolean
      required: [id, name, category, price, inStock]

    AmcPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        duration:
          type: integer
        servicesIncluded:
          type: integer
        features:
          type: array
          items:
            type: string
      required: [id, name, price, duration]

    AmcSubscription:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        planId:
          type: integer
        planName:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
      required: [id, userId, planId, startDate, endDate, status]

    SubscribeAmcRequest:
      type: object
      properties:
        planId:
          type: integer
      required: [planId]

    Part:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
        description:
          type: string
      required: [id, name, minPrice, maxPrice]

    EstimateRequest:
      type: object
      properties:
        symptoms:
          type: array
          items:
            type: string
        serviceType:
          type: string
      required: [symptoms]

    CostEstimate:
      type: object
      properties:
        parts:
          type: array
          items:
            $ref: "#/components/schemas/EstimatePart"
        serviceCharge:
          type: number
        partsTotal:
          type: number
        totalMin:
          type: number
        totalMax:
          type: number
        diagnosis:
          type: string
      required: [serviceCharge, partsTotal, totalMin, totalMax]

    EstimatePart:
      type: object
      properties:
        name:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
        reason:
          type: string
      required: [name, minPrice, maxPrice]

    ChatRequest:
      type: object
      properties:
        message:
          type: string
        sessionId:
          type: string
        userId:
          type: integer
      required: [message, sessionId]

    ChatResponse:
      type: object
      properties:
        message:
          type: string
        sessionId:
          type: string
        intent:
          type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        estimate:
          $ref: "#/components/schemas/CostEstimate"
        bookingCreated:
          type: boolean
        bookingId:
          type: integer
        action:
          type: string
      required: [message, sessionId]

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        intent:
          type: string
      required: [id, role, content, timestamp]

    EarningsSummary:
      type: object
      properties:
        totalEarnings:
          type: number
        thisMonthEarnings:
          type: number
        totalJobs:
          type: integer
        completedJobs:
          type: integer
        pendingJobs:
          type: integer
        averageRating:
          type: number
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
      required: [totalEarnings, thisMonthEarnings, totalJobs, completedJobs, pendingJobs]

    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        technicianId:
          type: integer
        bookingId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        userName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, technicianId, bookingId, rating]

    CreateReviewRequest:
      type: object
      properties:
        technicianId:
          type: integer
        bookingId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required: [technicianId, bookingId, rating]

    WaterQuality:
      type: object
      properties:
        city:
          type: string
        tds:
          type: integer
        hardness:
          type: string
        ph:
          type: number
